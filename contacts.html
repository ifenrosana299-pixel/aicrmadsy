<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelanggan — Adsy CRM</title>
<link rel="stylesheet" href="css/style.css">
<style>
#table-wrap{flex:1;overflow-y:auto;padding:16px 20px}
table{width:100%;border-collapse:collapse;background:#161b22;border:1px solid rgba(255,255,255,.06);border-radius:10px;overflow:hidden}
thead th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:#64748b;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.06);background:#0d1117}
tbody td{padding:11px 14px;font-size:12.5px;border-bottom:1px solid rgba(255,255,255,.04);color:#cbd5e1}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(139,92,246,.04);cursor:pointer}
.t-name{display:flex;align-items:center;gap:9px;font-weight:600;color:#e2e8f0}
.t-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.stage-chip{font-size:10.5px;padding:3px 9px;border-radius:10px;font-weight:600}
.esc-flag{color:#fca5a5;font-size:11px;font-weight:600}
</style>
</head>
<body>

<div id="sidebar"></div>

<div id="main">
  <div id="top-header">
    <div class="th-left">
      <h1>Pelanggan</h1>
      <p>Semua kontak yang sudah masuk pipeline CRM</p>
    </div>
    <div class="th-right">
      <div class="th-search"><span style="font-size:13px;color:#374151">🔍</span><input placeholder="Cari nama atau nomor..." id="searchInput" /></div>
      <div class="th-notif">🔔</div>
    </div>
  </div>

  <div id="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Nama</th>
          <th>Nomor</th>
          <th>Produk Terakhir</th>
          <th>Stage</th>
          <th>Repeat</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/mock-data.js"></script>
<script src="js/app.js"></script>
<script>
renderSidebar('contacts.html');

function render(){
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  let rows = MOCK_PIPELINE;
  if(q) rows = rows.filter(c => c.name.toLowerCase().includes(q) || c.phone.includes(q));

  document.getElementById('tbody').innerHTML = rows.map(c=>{
    const stage = STAGES.find(s=>s.id===c.stage);
    return `<tr onclick="location.href='pipeline.html'">
      <td><div class="t-name"><span class="t-av" style="background:${avatarColor(c.name)}">${initials(c.name)}</span>${esc(c.name)}</div></td>
      <td>${c.phone}</td>
      <td>${esc(c.product)}</td>
      <td><span class="stage-chip" style="background:${stage.color}22;color:${stage.color}">${stage.label}</span></td>
      <td>×${c.repeat}</td>
      <td>${c.escalated ? '<span class="esc-flag">⚠ Eskalasi</span>' : '🤖 AI Aktif'}</td>
    </tr>`;
  }).join('');
}
document.getElementById('searchInput').addEventListener('input', render);
render();
</script>
</body>
</html>
