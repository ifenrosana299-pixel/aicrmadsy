<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Insights — Adsy CRM</title>
<link rel="stylesheet" href="css/style.css">
<style>
#insights-wrap{flex:1;overflow-y:auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-bottom:16px}
.big-card{background:#161b22;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:18px}
.big-card h3{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;font-weight:700}
.sent-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sent-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sent-label{flex:1;font-size:12.5px;color:#94a3b8}
.sent-num{font-size:13px;font-weight:700;color:#e2e8f0}
.signal-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12.5px}
.signal-item:last-child{border-bottom:none}
.signal-name{color:#e2e8f0;font-weight:600}
.signal-meta{color:#64748b;font-size:11px;margin-top:2px}
.signal-badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:10px;background:rgba(239,68,68,.12);color:#fca5a5}
</style>
</head>
<body>

<div id="sidebar"></div>

<div id="main">
  <div id="top-header">
    <div class="th-left">
      <h1>AI Insights</h1>
      <p>Ringkasan performa AI follow-up engine</p>
    </div>
    <div class="th-right"><div class="th-notif">🔔</div></div>
  </div>

  <div id="insights-wrap">
    <div class="grid">
      <div class="big-card">
        <h3>Distribusi Sentiment (7 hari)</h3>
        <div class="sent-row"><span class="sent-dot" style="background:#22c55e"></span><span class="sent-label">Positif</span><span class="sent-num">82%</span></div>
        <div class="sent-row"><span class="sent-dot" style="background:#64748b"></span><span class="sent-label">Netral</span><span class="sent-num">12%</span></div>
        <div class="sent-row"><span class="sent-dot" style="background:#ef4444"></span><span class="sent-label">Negatif</span><span class="sent-num">6%</span></div>
      </div>
      <div class="big-card">
        <h3>Volume Follow-up</h3>
        <div class="sent-row"><span class="sent-label">Terkirim hari ini</span><span class="sent-num">14</span></div>
        <div class="sent-row"><span class="sent-label">Dapat balasan</span><span class="sent-num">9</span></div>
        <div class="sent-row"><span class="sent-label">Response rate</span><span class="sent-num">64%</span></div>
      </div>
      <div class="big-card">
        <h3>Konversi Repeat</h3>
        <div class="sent-row"><span class="sent-label">Hot lead → closing</span><span class="sent-num">38%</span></div>
        <div class="sent-row"><span class="sent-label">Rata-rata siklus</span><span class="sent-num">9 hari</span></div>
      </div>
    </div>

    <div class="big-card">
      <h3>⚠ Perlu Perhatian — Sinyal Negatif Terdeteksi</h3>
      <div id="alertList"></div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/mock-data.js"></script>
<script src="js/app.js"></script>
<script>
renderSidebar('insights.html');

const escalated = MOCK_PIPELINE.filter(c=>c.escalated);
document.getElementById('alertList').innerHTML = escalated.length
  ? escalated.map(c=>`
    <div class="signal-item">
      <div>
        <div class="signal-name">${esc(c.name)}</div>
        <div class="signal-meta">${esc(c.product)} &middot; ${c.phone}</div>
      </div>
      <span class="signal-badge">Eskalasi</span>
    </div>`).join('')
  : '<div style="color:#475569;font-size:12px;padding:8px 0">Tidak ada sinyal negatif saat ini 👍</div>';
</script>
</body>
</html>
