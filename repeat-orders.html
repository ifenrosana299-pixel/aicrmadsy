<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repeat Orders — Adsy CRM</title>
<link rel="stylesheet" href="css/style.css">
<style>
#table-wrap{flex:1;overflow-y:auto;padding:16px 20px}
table{width:100%;border-collapse:collapse;background:#161b22;border:1px solid rgba(255,255,255,.06);border-radius:10px;overflow:hidden}
thead th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:#64748b;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.06);background:#0d1117}
tbody td{padding:11px 14px;font-size:12.5px;border-bottom:1px solid rgba(255,255,255,.04);color:#cbd5e1}
tbody tr:last-child td{border-bottom:none}
.status-chip{font-size:10.5px;padding:3px 9px;border-radius:10px;font-weight:600}
.empty-state{text-align:center;padding:50px 20px;color:#475569}
.empty-state .ic{font-size:36px;margin-bottom:10px;opacity:.4}
</style>
</head>
<body>

<div id="sidebar"></div>

<div id="main">
  <div id="top-header">
    <div class="th-left">
      <h1>Repeat Orders</h1>
      <p>Fulfillment order repeat — dari closing repeat sampai sampai lagi</p>
    </div>
    <div class="th-right"><div class="th-notif">🔔</div></div>
  </div>

  <div id="table-wrap">
    <table>
      <thead>
        <tr><th>Pelanggan</th><th>Produk</th><th>Repeat ke-</th><th>Status Fulfillment</th><th>Resi</th></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="ic">📦</div>
      <div>Belum ada repeat order yang sedang diproses</div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/mock-data.js"></script>
<script src="js/app.js"></script>
<script>
renderSidebar('repeat-orders.html');

// Repeat order = kartu yang sudah closing repeat (stage 'closing')
const repeats = MOCK_PIPELINE.filter(c => c.stage === 'closing');

if(!repeats.length){
  document.getElementById('emptyState').style.display = 'block';
  document.querySelector('table').style.display = 'none';
} else {
  document.getElementById('tbody').innerHTML = repeats.map(c => `
    <tr>
      <td><b style="color:#e2e8f0">${esc(c.name)}</b><br><span style="color:#64748b;font-size:11px">${c.phone}</span></td>
      <td>${esc(c.product)}</td>
      <td>×${c.repeat}</td>
      <td><span class="status-chip" style="background:rgba(139,92,246,.13);color:#c4b5fd">Menunggu Resi</span></td>
      <td style="color:#475569">—</td>
    </tr>
  `).join('');
}
</script>
</body>
</html>
